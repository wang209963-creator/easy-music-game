<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>4K 大間隔音遊 - 專業選歌與連擊分版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    
    <style>
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background-color: #0d0d11;
            color: #ffffff;
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 主畫面：設定介面 */
        #setup-container {
            width: 95%;
            max-width: 850px;
            max-height: 95vh;
            background: #1c1c24;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            z-index: 10;
            overflow-y: auto;
            touch-action: pan-y; 
        }

        .setup-layout {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 15px;
        }

        @media (max-width: 768px) or (orientation: portrait) {
            .setup-layout { grid-template-columns: 1fr; }
        }

        .input-group { margin-bottom: 12px; }
        .input-group label {
            display: block; margin-bottom: 6px; font-weight: bold; color: #00e5ff; font-size: 14px;
        }

        .singer-dynamic-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #14141c;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
            overflow-y: auto;
            max-height: 120px;
            touch-action: pan-y;
        }
        .singer-row-item {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        select, input[type="file"], textarea, input[type="text"], input[type="number"], input[type="range"] {
            width: 100%; padding: 8px 10px; background: #2d2d3a; border: 1px solid #444; color: #fff; border-radius: 6px; font-size: 13px;
        }
        textarea { height: 45px; resize: none; }

        .add-singer-btn, .delete-singer-db-btn, .remove-singer-btn {
            color: #fff; border: none; padding: 0 10px; height: 33px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; white-space: nowrap;
        }
        .add-singer-btn { background: #9c27b0; }
        .delete-singer-db-btn { background: #f44336; transition: background 0.2s; }
        .delete-singer-db-btn:hover { background: #d32f2f; }
        .remove-singer-btn { background: #d32f2f; }

        .main-btn-group { display: flex; flex-direction: column; justify-content: center; gap: 10px; }
        .menu-btn {
            width: 100%; padding: 13px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; border: none; transition: background 0.2s;
        }
        #start-btn { background: #00e5ff; color: #000; font-size: 18px; }
        #save-btn { background: #4caf50; color: #fff; }
        #level-btn { background: #ff9800; color: #fff; }
        #settings-btn { background: #607d8b; color: #fff; }

        /* 彈出層：關卡選單 */
        #level-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1e1e2a; border: 3px solid #3d3d52; border-radius: 16px;
            width: 95%; max-width: 800px; height: 90vh; max-height: 600px; z-index: 100;
            box-shadow: 0 15px 50px rgba(0,0,0,0.9); padding: 25px; flex-direction: column;
            overflow: hidden; touch-action: pan-y !important; 
        }

        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #3d3d52; padding-bottom: 12px; margin-bottom: 15px; }
        .modal-title { font-size: 20px; color: #ff9800; font-weight: bold; margin: 0; }
        .search-box { width: 170px; padding: 6px 12px; background: #111116; border: 1px solid #555; color: #fff; border-radius: 20px; font-size: 13px; }

        #level-list-content { 
            flex: 1; overflow-y: auto !important; margin-bottom: 12px; padding-right: 5px; touch-action: pan-y !important; -webkit-overflow-scrolling: touch; 
        }

        .singer-group-header {
            background: #14141c; border-left: 4px solid #9c27b0; color: #e040fb; padding: 8px 12px; font-weight: bold; font-size: 14px; margin-top: 10px; margin-bottom: 5px; border-radius: 0 6px 6px 0; word-break: break-all; line-height: 1.4;
        }
        
        .song-item-row {
            background: #282836; border: 1px solid #44445c; border-radius: 8px; padding: 10px 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; gap: 10px; transition: background 0.2s;
        }
        .song-item-row:hover { background: #323244; }
        
        .song-info-clickable { flex: 1; min-width: 0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .song-title-wrap { flex: 1; min-width: 0; word-break: break-all; }
        .song-title-main { font-size: 16px; font-weight: bold; color: #fff; display: block; }
        .song-diff-tags-dis { color: #888; font-size: 13px; white-space: nowrap; flex-shrink: 0; }

        .delete-level-btn {
            background: #c62828; color: #fff; border: none; padding: 6px 12px; font-size: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; flex-shrink: 0; transition: background 0.2s; z-index: 10;
        }
        .delete-level-btn:hover { background: #e53935; }

        /* 難度選擇子檢視區 */
        #difficulty-select-subview {
            display: none; flex: 1; grid-template-columns: 1fr 140px; gap: 24px; padding: 5px 0; height: 100%; min-height: 0; touch-action: pan-y;
        }

        .subview-left-card {
            background: #15151e; border: 1px solid #28283a; border-radius: 16px; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; box-shadow: inset 0 0 25px rgba(0, 0, 0, 0.6);
        }
        .subview-card-title { font-size: 26px; font-weight: bold; color: #fff; margin: 0 0 4px 0; word-break: break-all; letter-spacing: 1px; }
        .subview-card-singer { font-size: 13px; color: #9b8bf7; margin: 0 0 14px 0; word-break: break-all; opacity: 0.9; }
        .subview-card-highscore { font-size: 14px; color: #ffcc00; margin: 8px 0; font-weight: bold; background: rgba(0,0,0,0.4); padding: 6px 16px; border-radius: 20px; border: 1px dashed #ffcc00; }

        .marathon-settings-box {
            background: #1f1f2e; border: 1px solid #3d3d52; border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; display: none; flex-direction: column; gap: 8px; width: 100%; max-width: 320px; text-align: left;
        }
        .marathon-cfg-row { display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: #e040fb; }
        .marathon-cfg-row label { display: flex; align-items: center; gap: 6px; font-weight: bold; cursor: pointer; user-select: none; }
        .marathon-cfg-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
        .marathon-cfg-row input[type="number"] { width: 60px; padding: 3px 6px; background: #2d2d3a; border: 1px solid #555; color: #fff; text-align: center; border-radius: 4px; }

        .subview-right-sidebar {
            display: flex; flex-direction: column; gap: 14px; align-items: center; justify-content: center; border-left: 1px solid #2d2d3d; padding-left: 20px; height: 100%;
        }
        .sidebar-diff-label { font-size: 11px; color: #717185; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; }
        
        .diff-circle-btn {
            width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; font-family: Arial, sans-serif; box-shadow: 0 5px 12px rgba(0,0,0,0.4); transition: transform 0.15s, box-shadow 0.15s; position: relative;
        }
        .diff-circle-btn:active { transform: scale(0.9); }
        .diff-circle-btn::after {
            content: attr(data-hover-text); position: absolute; right: 68px; background: rgba(0,0,0,0.85); color: #fff; font-size: 11px; font-weight: bold; padding: 5px 9px; border-radius: 4px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s; border: 1px solid #444;
        }
        .diff-circle-btn:hover::after { opacity: 1; }

        .diff-c-easy { background: #4caf50; color: #fff; }
        .diff-c-normal { background: #ff9800; color: #fff; }
        .diff-c-hard { background: #e91e63; color: #fff; }
        .diff-c-special { background: linear-gradient(135deg, #7b1fa2, #00e5ff); color: #fff; }
        .diff-c-disabled { background: #22222a !important; color: #444452 !important; cursor: not-allowed; opacity: 0.15; box-shadow: none; }
        .diff-c-disabled:hover::after { display: none; }

        .subview-back-btn {
            background: rgba(255, 255, 255, 0.05); color: #aaa; border: 1px solid #3a3a4e; padding: 8px 16px; font-size: 13px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.2s;
        }
        .subview-back-btn:hover { background: rgba(255, 255, 255, 0.1); color: #fff; border-color: #555; }

        .modal-footer { display: flex; justify-content: space-between; align-items: center; border-top: 2px solid #3d3d52; padding-top: 10px; }
        .nav-btn { background: #343446; color: #fff; border: none; padding: 8px 16px; font-size: 14px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        #game-container { display: none; position: relative; background: #050508; overflow: hidden; touch-action: none; }
        @media (orientation: landscape) { #game-container { width: 1024px; height: 576px; border: 2px solid #333; border-radius: 8px; } }
        @media (orientation: portrait) { #game-container { width: 100vw; height: 100vh; border: none; border-radius: 0; } }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #lyric-container { position: absolute; left: 0; width: 100%; z-index: 2; text-align: center; pointer-events: none; display: flex; justify-content: center; }
        #lyric-text {
            display: inline-block; background: rgba(5, 5, 10, 0.9); color: #ffffff; padding: 8px 20px; border-radius: 8px; font-size: 22px; font-weight: bold; border-bottom: 3px solid #00e5ff; text-shadow: 0 2px 5px rgba(0,0,0,0.9);
        }

        #touch-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; }
        .touch-zone { position: absolute; cursor: pointer; }
        #ingame-panel { position: absolute; z-index: 5; display: none; }
        .action-btn { background: rgba(20, 20, 30, 0.9); color: #00e5ff; border: 2px solid #00e5ff; padding: 10px 20px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; }

        /* 暫停選單 */
        #pause-menu {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15, 15, 25, 0.98); border: 2px solid #ff3333; padding: 25px 30px; border-radius: 12px; text-align: center; z-index: 6; width: 320px;
        }
        .pause-setting-row { display: flex; align-items: center; justify-content: space-between; margin: 12px 0; font-size: 14px; text-align: left; }
        .pause-setting-row label { color: #00e5ff; font-weight: bold; width: 85px; }
        .pause-btn { width: 100%; background: #2d2d3a; color: #fff; border: 1px solid #555; padding: 12px; font-size: 16px; font-weight: bold; margin: 8px 0; border-radius: 6px; cursor: pointer; }

        /* 遊戲參數設定彈窗 */
        #settings-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1e1e2a; border: 3px solid #00e5ff; border-radius: 16px; width: 90%; max-width: 480px; padding: 25px; box-shadow: 0 15px 50px rgba(0,0,0,0.9); z-index: 110; flex-direction: column; touch-action: pan-y;
        }
        .setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
        .setting-row label { font-size: 15px; color: #00e5ff; font-weight: bold; width: 120px; }
        .setting-control { flex: 1; display: flex; align-items: center; gap: 10px; }
        .setting-val-dis { width: 55px; text-align: right; font-family: monospace; font-size: 14px; color: #fff; font-weight: bold; }

        #result-screen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 15, 0.98); z-index: 8; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .result-title { font-size: 32px; color: #00e5ff; font-weight: bold; margin-bottom: 10px; text-align: center; }
        #result-rank { font-size: 64px; font-weight: bold; margin-bottom: 15px; text-shadow: 0 0 20px rgba(0,229,255,0.6); }
        .result-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px 30px; width: 100%; max-width: 450px; background: #171722; padding: 20px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px;
        }
        .result-label { font-size: 16px; color: #aaa; font-weight: bold;}
        .result-val { font-size: 18px; font-weight: bold; text-align: right; font-family: monospace; }
    </style>
</head>
<body>

    <div id="setup-container">
        <h3 style="margin: 0 0 12px 0; color:#fff; text-align:center;">🎵 4K 大間隔音遊 (合併儲存與真不重複隨機優化)</h3>
        <div class="setup-layout">
            <div>
                <div class="input-group">
                    <label>自訂歌曲名稱：</label>
                    <input type="text" id="level-name-input" placeholder="請輸入歌曲名稱...">
                </div>
                
                <div class="input-group">
                    <label>演唱歌手陣容：</label>
                    <div class="singer-dynamic-group" id="singer-global-box"></div>
                    <button class="nav-btn" id="add-new-singer-row-btn" style="margin-top: 6px; width:100%; background:#7b1fa2; font-size:12px;">➕ 新增合唱歌手</button>
                </div>

                <div class="input-group">
                    <label>1. 音樂檔案（同一首歌換難度時，若沒重新選擇，將會直接沿用舊音樂）：</label>
                    <input type="file" id="audio-input" accept="audio/*,video/mp4,video/quicktime">
                </div>
                <div class="input-group">
                    <label>2. 樂譜 JSON 檔案：</label>
                    <input type="file" id="chart-input" accept=".json">
                </div>
                <div class="input-group">
                    <label>3. 歌詞輸入：</label>
                    <input type="file" id="lyric-file-input" accept=".docx,.pdf,.lrc,.txt" style="margin-bottom: 4px;">
                    <textarea id="lyric-text-input" placeholder="可貼上帶時間軸的 LRC 歌詞..."></textarea>
                </div>
            </div>
            <div class="main-btn-group">
                <button class="menu-btn" id="save-btn">💾 保存/覆蓋此難度譜面</button>
                <button class="menu-btn" id="level-btn">📂 打開關卡清單畫面</button>
                <button class="menu-btn" id="settings-btn">⚙️ 遊戲參數設定</button>
                <button class="menu-btn" id="start-btn">🚀 讀取配置・直接開始</button>
            </div>
        </div>
    </div>

    <div id="level-modal">
        <div class="modal-header">
            <h4 class="modal-title" id="modal-header-title">📊 選擇難度</h4>
            <input type="text" id="search-input" class="search-box" placeholder="🔍 搜尋關卡或歌手...">
        </div>

        <div id="level-list-content"></div>
        
        <div id="difficulty-select-subview">
            <div class="subview-left-card">
                <h2 id="subview-song-title" class="subview-card-title">歌曲名稱</h2>
                <p id="subview-song-singer" class="subview-card-singer">演唱歌手：歌手名稱</p>
                <div id="subview-song-highscore" class="subview-card-highscore">最佳紀錄：尚未挑戰</div>
                
                <div class="marathon-settings-box" id="subview-marathon-box">
                    <div class="marathon-cfg-row" style="display: none;">
                        <label><input type="checkbox" id="cfg-true-marathon" checked> 🧩 啟動真接力模式</label>
                    </div>
                    <div class="marathon-cfg-row">
                        <label><input type="checkbox" id="cfg-endless-mode"> ♾️ 開啟無盡挑戰 (不限曲數)</label>
                    </div>
                    <div class="marathon-cfg-row" id="cfg-stage-count-row">
                        <span>🎵 自選挑戰曲數：</span>
                        <input type="number" id="cfg-stage-count" min="1" max="50" value="3">
                    </div>
                </div>

                <button class="subview-back-btn" id="sub-back-to-list">↩️ 返回歌曲列表</button>
            </div>
            <div class="subview-right-sidebar">
                <span class="sidebar-diff-label">DIFFICULTY</span>
                <button class="diff-circle-btn diff-c-easy" id="sub-btn-easy" data-hover-text="EASY 易">E</button>
                <button class="diff-circle-btn diff-c-normal" id="sub-btn-normal" data-hover-text="NORMAL 普">N</button>
                <button class="diff-circle-btn diff-c-hard" id="sub-btn-hard" data-hover-text="HARD 難">H</button>
                <button class="diff-circle-btn diff-c-special" id="sub-btn-special" data-hover-text="RANDOM 隨機模式">R</button>
            </div>
        </div>
        
        <div class="modal-footer" id="modal-main-footer">
            <button class="nav-btn" id="close-modal-btn" style="background:#55566a;">返回主選單</button>
            <div style="display: flex; gap: 8px;">
                <button class="nav-btn" id="prev-page-btn">◀ 上一頁</button>
                <span id="page-indicator" style="color: #aaa; font-size:14px; align-self: center; font-family: monospace;">1 / 1</span>
                <button class="nav-btn" id="next-page-btn">下一頁 ▶</button>
            </div>
        </div>
    </div>

    <div id="settings-modal">
        <div class="modal-header"><h4 class="modal-title" style="color: #00e5ff;">⚙️ 遊戲參數設定</h4></div>
        <div style="flex: 1; padding: 10px 0;">
            <div class="setting-row">
                <label>音樂音量</label>
                <div class="setting-control"><input type="range" id="volume-music" min="0" max="100" value="80"><span class="setting-val-dis" id="volume-music-dis">80%</span></div>
            </div>
            <div class="setting-row">
                <label>打擊音效音量</label>
                <div class="setting-control"><input type="range" id="volume-sfx" min="0" max="100" value="70"><span class="setting-val-dis" id="volume-sfx-dis">70%</span></div>
            </div>
            <div class="setting-row">
                <label>音符下落速度</label>
                <div class="setting-control"><input type="range" id="speed-slider" min="1" max="12" value="6" step="1"><span class="setting-val-dis" id="speed-slider-dis">6 速</span></div>
            </div>
        </div>
        <div class="modal-footer" style="justify-content: flex-end;"><button class="nav-btn" id="close-settings-btn" style="background: #4caf50;">套用並返回</button></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="touch-overlay"></div>
        <div id="lyric-container"><span id="lyric-text">... 準備就緒 ...</span></div>
        <div id="ingame-panel">
            <span id="marathon-indicator" style="color:#e040fb; font-weight:bold; margin-right:15px; font-size:14px; display:none; background:rgba(0,0,0,0.6); padding:5px 10px; border-radius:4px;"></span>
            <button class="action-btn" id="pause-btn">⏸️ 暫停</button>
        </div>
        
        <div id="pause-menu">
            <h3 style="color: #ff3333; margin-top: 0; margin-bottom: 15px;">遊戲暫停</h3>
            
            <div class="pause-setting-row">
                <label>音樂音量</label>
                <input type="range" id="pause-volume-music" min="0" max="100" value="80">
                <span style="width: 45px; text-align: right; font-family: monospace;" id="pause-volume-music-dis">80%</span>
            </div>
            <div class="pause-setting-row">
                <label>音效音量</label>
                <input type="range" id="pause-volume-sfx" min="0" max="100" value="70">
                <span style="width: 45px; text-align: right; font-family: monospace;" id="pause-volume-sfx-dis">70%</span>
            </div>
            <div class="pause-setting-row">
                <label>下落速度</label>
                <input type="range" id="pause-speed-slider" min="1" max="12" value="6" step="1">
                <span style="width: 45px; text-align: right; font-family: monospace;" id="pause-speed-slider-dis">6 速</span>
            </div>
            
            <hr style="border: none; border-top: 1px solid #333; margin: 15px 0;">
            
            <button class="pause-btn" id="resume-btn">▶️ 繼續</button>
            <button class="pause-btn" id="restart-btn" style="background: #ff9800; color: #fff;">🔄 重來</button>
            <button class="pause-btn" id="abort-btn">🚪 放棄</button>
        </div>
        
        <div id="result-screen">
            <div class="result-title" id="result-screen-title">🎵 挑戰結算報告</div>
            <div id="result-rank">🔮 Rank S</div>
            <div class="result-grid">
                <div class="result-label" style="color: #ffff00;">TOTAL SCORE</div><div class="result-val" id="res-score" style="color: #ffff00; font-size: 22px;">0</div>
                <div class="result-label" style="color: #00e5ff;">MAX COMBO</div><div class="result-val" id="res-maxcombo" style="color: #00e5ff;">0</div>
                <div class="result-label" style="color: #66e5ff;">PERFECT</div><div class="result-val" id="res-perfect" style="color: #66e5ff;">0</div>
                <div class="result-label" style="color: #00ff00;">GREAT</div><div class="result-val" id="res-great" style="color: #00ff00;">0</div>

        function initDatabase() {
            try {
                const request = indexedDB.open("RhythmGameDB_v12_Deduplicate", 1);
                request.onblocked = function() { dbReady = true; };
                request.onupgradeneeded = function(e) {
                    let database = e.target.result;
                    if (!database.objectStoreNames.contains("levels")) { 
                        database.createObjectStore("levels", { keyPath: "name_singer" }); 
                    }
                };
                request.onsuccess = function(e) { db = e.target.result; dbReady = true; initSingerComponent(); refreshLevelList(); };
                request.onerror = function(e) { dbReady = true; };

        document.getElementById('cfg-endless-mode').addEventListener('change', (e) => {

        function createSingerRow(isFirst = false, initialValue = "未知歌手") {
            const box = document.getElementById('singer-global-box');
            const row = document.createElement('div'); row.className = "singer-row-item";
            const select = document.createElement('select'); select.className = "dynamic-singer-select";

            addPromptBtn.onclick = () => {
                const name = prompt("請輸入全新歌手的名稱：");
                if (name && name.trim() !== "") { const trimmed = name.trim(); registerNewSingerToPool(trimmed); updateAllSingerSelects(trimmed, select); }
            };

            const deletePromptBtn = document.createElement('button'); deletePromptBtn.className = "delete-singer-db-btn"; deletePromptBtn.innerText = "🗑️ 刪除此歌手"; deletePromptBtn.type = "button";
            deletePromptBtn.onclick = () => {
                const targetSinger = select.value; if (targetSinger === "未知歌手") { alert("⚠️ 「未知歌手」無法刪除！"); return; }
                if (confirm(`確定要刪除「${targetSinger}」嗎？`)) {
                    globalSingerPool = globalSingerPool.filter(s => s !== targetSinger); localStorage.setItem("rhythm_singer_pool", JSON.stringify(globalSingerPool));
                    document.querySelectorAll('.dynamic-singer-select').forEach(sel => {
                        if (sel.value === targetSinger) sel.value = "未知歌手";
                        for (let i = 0; i < sel.options.length; i++) { if (sel.options[i].value === targetSinger) { sel.remove(i); break; } }
                    });
                }
            };

            row.appendChild(select); row.appendChild(addPromptBtn); row.appendChild(deletePromptBtn); 
            if (!isFirst) {
                const removeBtn = document.createElement('button'); removeBtn.className = "remove-singer-btn"; removeBtn.innerText = "❌ 移除"; removeBtn.type = "button";
                removeBtn.onclick = () => { row.remove(); }; row.appendChild(removeBtn);
            }
            box.appendChild(row);
        }

        function registerNewSingerToPool(name) { if (!globalSingerPool.includes(name)) { globalSingerPool.push(name); localStorage.setItem("rhythm_singer_pool", JSON.stringify(globalSingerPool)); } }
        function updateAllSingerSelects(newValue, targetSelectElement) {
            document.querySelectorAll('.dynamic-singer-select').forEach(sel => {
                let exist = false; for(let i=0; i<sel.options.length; i++) { if(sel.options[i].value === newValue) { exist = true; break; } }
                if(!exist) { const opt = document.createElement('option'); opt.value = newValue; opt.innerText = newValue; sel.appendChild(opt); }
            });
            if(targetSelectElement) targetSelectElement.value = newValue;
        }
        document.getElementById('add-new-singer-row-btn').addEventListener('click', () => { createSingerRow(false, "未知歌手"); });
        function getCombinedSingers() {
            let array = []; document.querySelectorAll('.dynamic-singer-select').forEach(sel => { if (sel.value && sel.value.trim() !== "") array.push(sel.value.trim()); });
            if (array.length === 0) return "未知歌手"; return [...new Set(array)].join(" & ");
        }
        function syncSingerDropdownsByString(singerStr) {
            const box = document.getElementById('singer-global-box'); box.innerHTML = ""; if (!singerStr) { createSingerRow(true, "未知歌手"); return; }
            singerStr.split(" & ").forEach((singerName, index) => { registerNewSingerToPool(singerName); updateAllSingerSelects(singerName, null); createSingerRow(index === 0, singerName); });
        }

        function syncVolumeControls(musicVol, sfxVol) {
            document.getElementById('volume-music').value = musicVol;
            document.getElementById('volume-music-dis').innerText = `${musicVol}%`;
            document.getElementById('volume-sfx').value = sfxVol;
            document.getElementById('volume-sfx-dis').innerText = `${sfxVol}%`;
            document.getElementById('pause-volume-music').value = musicVol;
            document.getElementById('pause-volume-music-dis').innerText = `${musicVol}%`;
            document.getElementById('pause-volume-sfx').value = sfxVol;
            document.getElementById('pause-volume-sfx-dis').innerText = `${sfxVol}%`;
        }

        document.getElementById('settings-btn').addEventListener('click', () => { document.getElementById('settings-modal').style.display = 'flex'; });
        document.getElementById('close-settings-btn').addEventListener('click', () => { document.getElementById('settings-modal').style.display = 'none'; });
        document.getElementById('speed-slider').addEventListener('input', (e) => { const val = parseInt(e.target.value); document.getElementById('speed-slider-dis').innerText = `${val} 速`; gameConfig.fallSpeed = val; });

        document.getElementById('volume-music').addEventListener('input', (e) => { 
            const val = parseInt(e.target.value); 
            gameConfig.musicVolume = val / 100; 
            if (musicGainNode && audioContext) { musicGainNode.gain.setValueAtTime(gameConfig.musicVolume, audioContext.currentTime); }
            syncVolumeControls(val, parseInt(document.getElementById('volume-sfx').value));
        });
        document.getElementById('volume-sfx').addEventListener('input', (e) => { 
            const val = parseInt(e.target.value); 
            gameConfig.sfxVolume = val / 100; 
            syncVolumeControls(parseInt(document.getElementById('volume-music').value), val);
        });

        document.getElementById('pause-volume-music').addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            gameConfig.musicVolume = val / 100;
            if (musicGainNode && audioContext) { musicGainNode.gain.setValueAtTime(gameConfig.musicVolume, audioContext.currentTime); }
            syncVolumeControls(val, parseInt(document.getElementById('pause-volume-sfx').value));
        });
        document.getElementById('pause-volume-sfx').addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            gameConfig.sfxVolume = val / 100;
            syncVolumeControls(parseInt(document.getElementById('pause-volume-music').value), val);
        });
        document.getElementById('pause-speed-slider').addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            document.getElementById('pause-speed-slider-dis').innerText = `${val} 速`;
        });

        document.getElementById('resume-btn').addEventListener('click', async () => { 
            if (audioContext) await audioContext.resume(); 
            const pauseSpeedVal = parseInt(document.getElementById('pause-speed-slider').value);
            
            if (pauseSpeedVal !== gameConfig.fallSpeed) {
                gameConfig.fallSpeed = pauseSpeedVal;
                document.getElementById('speed-slider').value = pauseSpeedVal;
                document.getElementById('speed-slider-dis').innerText = `${pauseSpeedVal} 速`;
                document.getElementById('pause-menu').style.display = 'none';
                
                if (!isMarathonMode) {
                    combo = 0; maxCombo = 0; scorePerfect = 0; scoreGreat = 0; scoreGood = 0; scoreBad = 0; scoreMiss = 0; currentLiveScore = 0; totalComboBonusScore = 0;
                }
                processInputsAndPrepare(!!loadedAudioBlob);
            } else {
                document.getElementById('pause-menu').style.display = 'none'; 
                countdownState = "RESUME_COUNTDOWN";
                countdownValue = 3;
                countdownTimeLeft = 3.0;
                isPaused = false;
                lastTimestamp = performance.now();
                requestAnimationFrame(gameLoop);
            }
        });

        document.getElementById('restart-btn').addEventListener('click', () => {
            const val = parseInt(document.getElementById('pause-speed-slider').value);
            gameConfig.fallSpeed = val;
            document.getElementById('speed-slider').value = val;
            document.getElementById('speed-slider-dis').innerText = `${val} 速`;
            document.getElementById('pause-menu').style.display = 'none';
            if (!isMarathonMode) {
                combo = 0; maxCombo = 0; scorePerfect = 0; scoreGreat = 0; scoreGood = 0; scoreBad = 0; scoreMiss = 0; currentLiveScore = 0; totalComboBonusScore = 0;
            }
            processInputsAndPrepare(!!loadedAudioBlob);
        });

        function playHitSound() {
            if (!audioContext || gameConfig.sfxVolume <= 0) return;
            try {
                const osc = audioContext.createOscillator(); const gain = audioContext.createGain();
                osc.type = 'triangle'; osc.frequency.setValueAtTime(600, audioContext.currentTime); osc.frequency.exponentialRampToValueAtTime(150, audioContext.currentTime + 0.06);
                gain.gain.setValueAtTime(gameConfig.sfxVolume, audioContext.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.06);
                osc.connect(gain); gain.connect(audioContext.destination); osc.start(); osc.stop(audioContext.currentTime + 0.06);
            } catch(e){}
        }

        async function readLyricFileAsText(file) {
            const ext = file.name.split('.').pop().toLowerCase();
            if (ext === 'docx') { return (await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() })).value || ""; }
            if (ext === 'pdf') {
                const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise; let text = "";
                for (let i = 1; i <= pdf.numPages; i++) { text += (await (await pdf.getPage(i)).getTextContent()).items.map(item => item.str).join(" ") + "\n"; }
                return text;
            }
            return await file.text();
        }

        document.getElementById('save-btn').addEventListener('click', async () => {
            if (!db) { alert("⚠️ 目前儲存功能限制。"); return; }
            const levelName = document.getElementById('level-name-input').value.trim(); if (!levelName) { alert("請先輸入歌曲名稱！"); return; }
            let levelSinger = getCombinedSingers(); 
            const audioFile = document.getElementById('audio-input').files[0]; 
            const chartFile = document.getElementById('chart-input').files[0];
            
            if (!chartFile) { alert("請選好 JSON 樂譜檔！"); return; }
            if (!chartFile.name.toLowerCase().endsWith('.json')) { alert("❌ 樂譜檔案格式錯誤！"); return; }

            let diffTag = "NORMAL";
            if (chartFile.name.toLowerCase().includes("易") || chartFile.name.toLowerCase().includes("easy")) diffTag = "EASY";
            else if (chartFile.name.toLowerCase().includes("難") || chartFile.name.toLowerCase().includes("hard")) diffTag = "HARD";

            try {
                const chartText = await chartFile.text(); try { JSON.parse(chartText); } catch(e) { alert("❌ JSON 解析失敗！"); return; }
                let lText = document.getElementById('lyric-text-input').value || ""; const lFile = document.getElementById('lyric-file-input').files[0];
                if (lFile) { try { lText = await readLyricFileAsText(lFile); } catch(e){ lText = ""; } }

                const storeKey = `${levelName}_${levelSinger}`;
                const tx = db.transaction(["levels"], "readwrite");
                const store = tx.objectStore("levels");
                
                store.get(storeKey).onsuccess = async function(e) {
                    let songRecord = e.target.result;
                    
                    if (!songRecord) {
                        if (!audioFile) { alert("這是新歌曲，必須上傳音樂檔案！"); return; }
                        songRecord = {
                            name_singer: storeKey,
                            name: levelName,
                            singer: levelSinger,
                            audioBlob: audioFile,
                            lyric: lText,
                            charts: {},
                            highscores: {},
                            highranks: {}
                        };
                    } else {
                        if (audioFile) songRecord.audioBlob = audioFile;
                        if (lFile || lText.trim() !== "") songRecord.lyric = lText;
                    }

                    songRecord.charts[diffTag] = chartText;
                    if (!songRecord.highscores[diffTag]) songRecord.highscores[diffTag] = 0;
                    if (!songRecord.highranks[diffTag]) songRecord.highranks[diffTag] = "⚪ Rank C";

                    store.put(songRecord).onsuccess = function() { 
                        alert(`關卡「${levelName}」[${diffTag}] 保存成功！（已自動進行檔案合併最佳化）`); 
                        refreshLevelList(); 
                    };
                };
            } catch(err) { alert("儲存失敗: " + err.message); }
        });

        window.deleteSongLevelGroup = function(event, groupKey) {
            event.stopPropagation(); if (!db) return; 
            const [singer, name] = groupKey.split("///");
            const storeKey = `${name}_${singer}`;
            if (confirm(`⚠️ 確定要刪除關卡：「${name}」的所有難度譜面與相關檔案嗎？`)) {
                const tx = db.transaction(["levels"], "readwrite");
                tx.objectStore("levels").delete(storeKey);
                tx.oncomplete = function() { alert("🗑️ 關卡已完整刪除。"); refreshLevelList(); };
            }
        };

        function refreshLevelList() {
            if (!db) return; allSongsData = {};
            try {
                db.transaction(["levels"], "readonly").objectStore("levels").openCursor().onsuccess = function(e) {
                    const cursor = e.target.result;
                    if (cursor) {
                        const val = cursor.value; 
                        (val.singer ? val.singer.split(" & ") : ["未知歌手"]).forEach(singleSinger => {
                            const groupKey = `${singleSinger.trim()}///${val.name}`;
                            allSongsData[groupKey] = val; 
                            registerNewSingerToPool(singleSinger.trim());
                        });
                        cursor.continue();
                    } else { updateAllSingerSelects("未知歌手", null); renderSongList(); }
                };
            } catch(e){}
        }

        function filteredSongs() {
            let res = {}; res["MARATHON///🏃 挑戰接力馬拉松 (多曲連續挑戰)"] = "MARATHON_ENTRY"; res["SPECIAL///🎲 隨機進入一關 (全隨機模式)"] = "RANDOM_ENTRY";
            Object.keys(allSongsData).forEach(groupKey => {
                const [singer, name] = groupKey.split("///"); 
                const songRecord = allSongsData[groupKey];
                const fullSingerStr = songRecord.singer || "";
                if (name.toLowerCase().includes(searchQuery) || singer.toLowerCase().includes(searchQuery) || fullSingerStr.toLowerCase().includes(searchQuery)) { res[groupKey] = songRecord; }
            });
            return res;
        }

        function renderSongList() {
            const listContent = document.getElementById('level-list-content'); listContent.innerHTML = "";
            const songs = filteredSongs(); let songKeys = Object.keys(songs);
            songKeys.sort((a, b) => { 
                if (a.startsWith("MARATHON")) return -1; if (b.startsWith("MARATHON")) return 1;
                if (a.startsWith("SPECIAL")) return -1; if (b.startsWith("SPECIAL")) return 1; 
                return a.localeCompare(b); 
            });
            const totalPages = Math.max(1, Math.ceil(songKeys.length / itemsPerPage));
            document.getElementById('page-indicator').innerText = `${currentPage} / ${totalPages}`;
            document.getElementById('prev-page-btn').disabled = (currentPage === 1);
            document.getElementById('next-page-btn').disabled = (totalPages === 0 || currentPage === totalPages);

            const startIdx = (currentPage - 1) * itemsPerPage; const endIdx = Math.min(startIdx + itemsPerPage, songKeys.length);
            let currentSingerHeader = "";
            for (let i = startIdx; i < endIdx; i++) {
                const groupKey = songKeys[i]; const [singer, name] = groupKey.split("///");
                if (singer !== "SPECIAL" && singer !== "MARATHON" && singer !== currentSingerHeader) {
                    currentSingerHeader = singer; const singerDiv = document.createElement('div'); singerDiv.className = 'singer-group-header'; singerDiv.innerText = `🎤 歌手: ${singer}`; listContent.appendChild(singerDiv);
                }
                const card = document.createElement('div'); card.className = 'song-item-row';
                if (name.startsWith("🏃")) {
                    card.innerHTML = `<div class="song-info-clickable" onclick="enterDifficultySubview('${groupKey}')"><div class="song-title-wrap"><span class="song-title-main" style="color:#e040fb;">${name}</span></div><span class="song-diff-tags-dis" style="color:#e040fb;">接力模式 ➔</span></div>`;
                } else if (name.startsWith("🎲")) {
                    card.innerHTML = `<div class="song-info-clickable" onclick="enterDifficultySubview('${groupKey}')"><div class="song-title-wrap"><span class="song-title-main" style="color:#ffcc00;">${name}</span></div><span class="song-diff-tags-dis" style="color:#ffcc00;">特殊隨機 ➔</span></div>`;
                } else {
                    const songRecord = allSongsData[groupKey];
                    const diffs = Object.keys(songRecord.charts).join(', '); 
                    card.innerHTML = `<div class="song-info-clickable" onclick="enterDifficultySubview('${groupKey}')"><div class="song-title-wrap"><span class="song-title-main">${name}</span><span style="color:#aaa; font-size:11px; display:block; margin-top:2px;">演唱: ${songRecord.singer || "未知歌手"}</span></div><span class="song-diff-tags-dis">難度: ${diffs} ➔</span></div><button class="delete-level-btn" onclick="deleteSongLevelGroup(event, '${groupKey}')">🗑️ 刪除</button>`;
                }
                listContent.appendChild(card);
            }
        }

        document.getElementById('level-btn').addEventListener('click', () => { document.getElementById('level-modal').style.display = 'flex'; switchViewToLobby(); });
        document.getElementById('close-modal-btn').addEventListener('click', () => { document.getElementById('level-modal').style.display = 'none'; });

        document.getElementById('start-btn').addEventListener('click', () => {
            const levelName = document.getElementById('level-name-input').value.trim(); if (!levelName) { alert("請先填寫或載入一首關卡歌曲！"); return; }
            currentPlayingName = levelName; currentPlayingSinger = getCombinedSingers(); currentPlayingDiffLabel = "CUSTOM"; currentPlayingKeyId = ""; processInputsAndPrepare(false);
        });

            document.getElementById('search-input').style.display = 'block';
            document.getElementById('modal-header-title').innerText = "📂 選擇關卡"; document.getElementById('level-list-content').style.display = 'block';

        window.enterDifficultySubview = function(groupKey) {
            selectedSongKey = groupKey; const [singer, name] = groupKey.split("///");
            document.getElementById('search-input').style.display = 'none';
            document.getElementById('level-list-content').style.display = 'none'; document.getElementById('modal-main-footer').style.display = 'none';
            document.getElementById('modal-header-title').innerText = "📊 選擇難度";
            document.getElementById('subview-song-title').innerText = name;
            document.getElementById('difficulty-select-subview').style.display = 'grid'; 
            const highscoreBox = document.getElementById('subview-song-highscore'); highscoreBox.innerText = "最佳紀錄：點選右側難度查看";

            const btnEasy = document.getElementById('sub-btn-easy'), btnNormal = document.getElementById('sub-btn-normal'), btnHard = document.getElementById('sub-btn-hard'), btnSpecial = document.getElementById('sub-btn-special');
            const marathonBox = document.getElementById('subview-marathon-box');

            if (singer === "MARATHON") {
                document.getElementById('subview-song-singer').innerText = "模式：多曲連續接力挑戰"; highscoreBox.style.display = 'none'; marathonBox.style.display = 'flex'; 
                btnSpecial.className = "diff-circle-btn diff-c-special"; btnEasy.className = "diff-circle-btn diff-c-easy"; btnNormal.className = "diff-circle-btn diff-c-normal"; btnHard.className = "diff-circle-btn diff-c-hard";
                btnEasy.onclick = () => startMarathonFlow('EASY'); btnNormal.onclick = () => startMarathonFlow('NORMAL'); btnHard.onclick = () => startMarathonFlow('HARD'); btnSpecial.onclick = () => startMarathonFlow('SPECIAL');
            } else if (name === "🎲 隨機進入一關 (全隨機模式)") {
                document.getElementById('subview-song-singer').innerText = "模式：由資料庫隨機抽取單曲"; highscoreBox.style.display = 'none'; marathonBox.style.display = 'none';
                btnSpecial.className = "diff-circle-btn diff-c-special"; btnEasy.className = "diff-circle-btn diff-c-easy"; btnNormal.className = "diff-circle-btn diff-c-normal"; btnHard.className = "diff-circle-btn diff-c-hard";
                btnEasy.onclick = () => triggerRandomMatch('EASY', true); btnNormal.onclick = () => triggerRandomMatch('NORMAL', true); btnHard.onclick = () => triggerRandomMatch('HARD', true); btnSpecial.onclick = () => triggerRandomMatch('SPECIAL', true);
            } else {
                highscoreBox.style.display = 'block';

        // Fisher-Yates 洗牌演算法
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 建立洗牌後的專屬音樂佇列
        function buildShufflePool(targetDiff) {
            let pool = [];
            let distinctSongs = {};
            
            // 避免因為多合唱重複抓歌，先過濾出唯一的 name_singer 紀錄
            Object.keys(allSongsData).forEach(groupKey => {
                const songRecord = allSongsData[groupKey];
                distinctSongs[songRecord.name_singer] = songRecord;
            });

            Object.keys(distinctSongs).forEach(key => {
                const songRecord = distinctSongs[key];
                if (targetDiff === 'SPECIAL') {
                    // 全隨機模式下，把該歌所有難度獨立打包塞入
                    Object.keys(songRecord.charts).forEach(d => {
                        pool.push({ song: songRecord, diff: d });
                    });
                } else {
                    if (songRecord.charts[targetDiff]) {
                        pool.push({ song: songRecord, diff: targetDiff });
                    }
                }
            });

            if (pool.length === 0) return [];
            
            // 一口氣打亂整張歌單 (洗牌制)
            shuffleArray(pool);

            // 優化防撞頭：若池子重新洗牌後的第一首歌和上一局剛結束的歌一樣，將其丟到最末尾
            if (pool.length > 1 && lastPlayedKeyId && pool[0].song.name_singer === lastPlayedKeyId) {
                const duplicatedItem = pool.shift();
                pool.push(duplicatedItem);
            }
            
            return pool;
        }

        // 核心修改點：音樂軟體式洗牌取樣 (隨機單曲抽取)
        function triggerRandomMatch(targetDiff, forcedResetPool = false) {
            // 如果被強制重設，或池子空了，就重新建立完整的洗牌歌單
            if (forcedResetPool || !shuffleSamplePool || shuffleSamplePool.length === 0) {
                shuffleSamplePool = buildShufflePool(targetDiff);
            }
            
            if (shuffleSamplePool.length === 0) {
                alert("資料庫內沒有任何符合該難度的歌曲！");
                return null;
            }

            // 從佇列最前面抽出一首歌（保證不重複，直到整輪耗盡）
            let matchItem = shuffleSamplePool.shift();

            // 防撞歌機制：如果抽出的第一首歌恰好跟上一次播完的一樣，且陣列中還有別的歌，就把這首塞回最尾端，改拿下一首
            if (lastPlayedKeyId && matchItem.song.name_singer === lastPlayedKeyId && shuffleSamplePool.length > 0) {
                shuffleSamplePool.push(matchItem);
                matchItem = shuffleSamplePool.shift();
            }

            const luckySong = matchItem.song;
            const luckyDiff = matchItem.diff;

            // 記錄本次播放歷史
            lastPlayedKeyId = luckySong.name_singer;

            currentPlayingName = luckySong.name; 
            currentPlayingSinger = luckySong.singer; 
            currentPlayingDiffLabel = luckyDiff; 
            currentPlayingKeyId = luckySong.name_singer;

            if (!isMarathonMode) { 
                document.getElementById('level-modal').style.display = 'none'; 
                executeLoad(luckySong, luckyDiff); 
            }
            return { song: luckySong, diff: luckyDiff };
        }

        // 核心修改點：接力模式同樣走完美洗牌制
        function startMarathonFlow(chosenDiff) {
            isEndlessMode = document.getElementById('cfg-endless-mode').checked;
            let chosenStageNum = parseInt(document.getElementById('cfg-stage-count').value); 
            if (isNaN(chosenStageNum) || chosenStageNum < 1) chosenStageNum = 3;
            
            marathonDiffFilter = chosenDiff; 
            isMarathonMode = true; 
            marathonTotalStages = chosenStageNum; 
            marathonCurrentStage = 1; 
            
            // 開啟接力時重新初始化洗牌池與清空歷史
            lastPlayedKeyId = ""; 
            shuffleSamplePool = buildShufflePool(marathonDiffFilter);

            marathonCumulativePerfect = 0; marathonCumulativeGreat = 0; marathonCumulativeGood = 0; marathonCumulativeBad = 0; marathonCumulativeMiss = 0; marathonMaxCombo = 0; marathonCumulativeScore = 0;
            combo = 0; maxCombo = 0; scorePerfect = 0; scoreGreat = 0; scoreGood = 0; scoreBad = 0; scoreMiss = 0; currentLiveScore = 0; totalComboBonusScore = 0;
            
            const firstTrack = triggerRandomMatch(marathonDiffFilter); 
            if (!firstTrack) { alert("資料庫內找不到對應難度的關卡歌曲！"); isMarathonMode = false; return; }
            document.getElementById('level-modal').style.display = 'none'; 
            executeLoad(firstTrack.song, firstTrack.diff);
        }

        async function proceedMarathonNextStage() {
            marathonCumulativePerfect += scorePerfect; marathonCumulativeGreat += scoreGreat; marathonCumulativeGood += scoreGood; marathonCumulativeBad += scoreBad; marathonCumulativeMiss += scoreMiss; 
            marathonCumulativeScore += currentLiveScore; if (maxCombo > marathonMaxCombo) marathonMaxCombo = maxCombo;
            
            // 若是非無盡模式且挑戰曲數已滿，則正常結算
            if (!isEndlessMode && marathonCurrentStage >= marathonTotalStages) { showMarathonFinalResult(); return; }
            marathonCurrentStage++; 
            
            // 直接由已洗牌的 Queue 中取出下一首歌，如果沒歌了 triggerRandomMatch 內部會自動重新充能洗牌
            const nextTrack = triggerRandomMatch(marathonDiffFilter); 
            if (!nextTrack) { showMarathonFinalResult(); return; }
            
            combo = 0; maxCombo = 0; scorePerfect = 0; scoreGreat = 0; scoreGood = 0; scoreBad = 0; scoreMiss = 0; currentLiveScore = 0; totalComboBonusScore = 0;
            lastJudgmentText = "NEXT STAGE"; judgmentColor = "#e040fb"; judgmentTimer = 30;

        function applyRankStyle(finalScore, isFC, isAP, elementId) {

        async function processInputsAndPrepare(isFromSaved = false) {

                if (isFromSaved) {

                } else {

            // 確保樂譜按照時間升序排序（指針法的前提關鍵）
            if (chartData && chartData.notes) {
                chartData.notes.sort((a, b) => a.time - b.time);
            }
            activeNoteIndex = 0; // 重置高效能音符起點指針

            if (!isMarathonMode) { 
                combo = 0; maxCombo = 0; scorePerfect = 0; scoreGreat = 0; scoreGood = 0; scoreBad = 0; scoreMiss = 0; currentLiveScore = 0; totalComboBonusScore = 0; 
            } else { 
                document.getElementById('marathon-indicator').innerText = isEndlessMode ? `♾️ 第 ${marathonCurrentStage} 首` : `🏃 第 ${marathonCurrentStage} / ${marathonTotalStages} 首`; 
            }

            lastJudgmentText = ""; judgmentTimer = 0; 
            chartData.notes.forEach(note => note.hit = false);

            window.removeEventListener('keydown', handleKeyDown); window.removeEventListener('keyup', handleKeyUp);
            window.addEventListener('keydown', handleKeyDown); window.addEventListener('keyup', handleKeyUp);
            
            const customFallTime = 2.15 - (gameConfig.fallSpeed * 0.15);

            countdownValue = 3; countdownTimeLeft = 3.0; gameTimeProgress = -customFallTime; isAudioStarted = false;
            countdownState = "COUNTDOWN";
        }

        function commitAudioPlayback() {
            if (isAudioStarted) return; isAudioStarted = true;
            try {
                audioSource = audioContext.createBufferSource(); audioSource.buffer = audioBuffer;
                musicGainNode = musicGainNode = audioContext.createGain(); musicGainNode.gain.setValueAtTime(gameConfig.musicVolume, audioContext.currentTime);
                audioSource.connect(musicGainNode); musicGainNode.connect(audioContext.destination); 
                
                let offsetTime = Math.max(0, gameTimeProgress);
                if (offsetTime < audioBuffer.duration) {
                    audioSource.start(0, offsetTime);
                }
            } catch(e){}
        }

        function parseLRC(text) {
            lyrics = []; if (!text) return;
            text.split('\n').forEach(line => {
                const match = /\[(\d+):(\d+)(?:\.(\d+))?\](.*)/.exec(line.trim());
                if (match) { let ms = match[3] ? parseInt(match[3]) : 0; if (match[3] && match[3].length === 2) ms *= 10; lyrics.push({ time: parseInt(match[1]) * 60 + parseInt(match[2]) + (ms / 1000), text: match[4].trim() }); }
            });
            lyrics.sort((a, b) => a.time - b.time);
        }

        function updateScoreAndComboBonus(noteJudgmentWeight) {
            if (!chartData || !chartData.notes || chartData.notes.length === 0) return;
            const N = chartData.notes.length; const baseNoteMax = 900000 / N;
            const liveBaseScore = ((scorePerfect * 1.0) + (scoreGreat * 0.75) + (scoreGood * 0.40)) * baseNoteMax;
            if (noteJudgmentWeight > 0) { const comboBonusMax = 100000 / ((N * (N + 1)) / 2); totalComboBonusScore += combo * comboBonusMax * noteJudgmentWeight; }
            currentLiveScore = Math.floor(liveBaseScore + totalComboBonusScore);
            if (currentLiveScore > 1000000) currentLiveScore = 1000000;
        }

        function triggerTrackHit(track) {
            if (countdownState === "COUNTDOWN" || countdownState === "RESUME_COUNTDOWN" || isPaused) return; trackKeyPressed[track] = true; playHitSound();
            const currentTime = gameTimeProgress + (chartData.audioOffset || 0.035);
            let targetNote = null; let minDiff = Infinity; let rawDiff = 0;
            
            // 效能最佳化：僅從 activeNoteIndex 指針向後搜尋附近的音符，不需看整首歌
            if (chartData && chartData.notes) {
                const maxSearchTime = currentTime + 0.5;
                for (let i = activeNoteIndex; i < chartData.notes.length; i++) {
                    const note = chartData.notes[i];
                    if (note.time > maxSearchTime) break; // 太遠了，直接中斷搜尋
                    if (note.track === track && !note.hit) {
                        let diff = Math.abs(note.time - currentTime);
                        if (diff < minDiff) {
                            minDiff = diff;
                            targetNote = note;
                            rawDiff = note.time - currentTime;
                        }
                    }
                }
            }
            
            if (targetNote) {
                if (rawDiff > 0.16 && rawDiff <= 0.40) { 
                    targetNote.hit = true; lastJudgmentText = "TOO EARLY (BAD)"; judgmentColor = "#ff55aa"; combo = 0; scoreBad++; judgmentTimer = 25; updateScoreAndComboBonus(0);
                } else if (minDiff <= 0.16) {
                    targetNote.hit = true;
                    if (minDiff <= 0.045) { lastJudgmentText = "PERFECT"; judgmentColor = "#00e5ff"; scorePerfect++; combo++; updateScoreAndComboBonus(1.0); } 
                    else if (minDiff <= 0.09) { lastJudgmentText = "GREAT"; judgmentColor = "#00ff00"; scoreGreat++; combo++; updateScoreAndComboBonus(0.75); } 
                    else if (minDiff <= 0.13) { lastJudgmentText = "GOOD"; judgmentColor = "#ff9800"; scoreGood++; combo++; updateScoreAndComboBonus(0.40); } 
                    else { lastJudgmentText = "BAD"; judgmentColor = "#ff55aa"; scoreBad++; combo = 0; updateScoreAndComboBonus(0); }
                    if(combo > maxCombo) maxCombo = combo; judgmentTimer = 25;
                }
            }
        }

        function releaseTrackHit(track) { trackKeyPressed[track] = false; }
        function handleKeyDown(e) { const t = keyBindings[e.key]; if (t !== undefined) triggerTrackHit(t); }
        function handleKeyUp(e) { const t = keyBindings[e.key]; if (t !== undefined) releaseTrackHit(t); }

        function setupTouchOverlayZones() {
            const overlay = document.getElementById('touch-overlay'); overlay.innerHTML = ""; overlay.style.display = "block";
            let laneWidth = isPortraitMode ? (canvasW / 4) : 160;
            let internalXs = isPortraitMode ? [laneWidth*0.5, laneWidth*1.5, laneWidth*2.5, laneWidth*3.5] : [180, 360, 664, 844];
            for (let i = 0; i < 4; i++) {
                const zone = document.createElement('div'); zone.className = 'touch-zone';
                zone.style.left = `${((internalXs[i] - laneWidth/2) / canvasW) * 100}%`; zone.style.width = `${(laneWidth / canvasW) * 100}%`; zone.style.top = "0"; zone.style.height = "100%";
                zone.addEventListener('touchstart', (e) => { e.preventDefault(); triggerTrackHit(i); }); zone.addEventListener('touchend', (e) => { e.preventDefault(); releaseTrackHit(i); });

        function gameLoop(timestamp) {
            if (!isPlaying || isPaused) return; 
            const dt = (timestamp - lastTimestamp) / 1000; lastTimestamp = timestamp; 

            if (countdownState === "LOADING") {
                document.getElementById('marathon-indicator').style.display = 'none'; 
                ctx.fillStyle = '#09090d'; ctx.fillRect(0, 0, canvasW, canvasH); drawTracksAndCircles(); 
                ctx.fillStyle = 'rgba(5, 5, 10, 0.8)'; ctx.fillRect(0, 0, canvasW, canvasH);

                countdownTimeLeft -= dt; countdownValue = Math.ceil(countdownTimeLeft);
                ctx.fillStyle = '#09090d'; ctx.fillRect(0, 0, canvasW, canvasH); drawTracksAndCircles(); 
                ctx.fillStyle = 'rgba(5, 5, 10, 0.75)'; ctx.fillRect(0, 0, canvasW, canvasH); 
                ctx.textAlign = 'center'; ctx.fillStyle = '#ffffff'; ctx.font = 'bold 34px "Microsoft JhengHei"'; 
                ctx.fillText(`🎵 ${currentPlayingName}`, canvasW / 2, canvasH / 2 - 75);
                ctx.fillStyle = '#e040fb'; ctx.font = currentPlayingSinger.length > 25 ? '15px "Microsoft JhengHei"' : '18px "Microsoft JhengHei"'; 
                ctx.fillText(`🎤 陣容: ${currentPlayingSinger}`, canvasW / 2, canvasH / 2 - 35);
                
                let diffColor = "#ff9800";
                if (currentPlayingDiffLabel === "EASY") diffColor = "#4caf50";
                if (currentPlayingDiffLabel === "HARD") diffColor = "#e91e63";
                if (currentPlayingDiffLabel === "SPECIAL" || currentPlayingDiffLabel === "CUSTOM") diffColor = "#00e5ff";
                
                ctx.fillStyle = diffColor; ctx.font = 'bold 22px Arial'; ctx.fillText(`[ DIFFICULTY: ${currentPlayingDiffLabel} ]`, canvasW / 2, canvasH / 2 + 5);
                ctx.fillStyle = '#aaa'; ctx.font = 'bold 14px Arial'; ctx.fillText(`速度: ${gameConfig.fallSpeed} 速`, canvasW / 2, canvasH / 2 + 35);
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 75px Arial'; ctx.fillText(countdownValue > 0 ? countdownValue : "GO!", canvasW / 2, canvasH / 2 + 125);
                
                if (countdownTimeLeft <= 0) { countdownState = "NONE"; }
                document.getElementById('lyric-container').style.display = 'none'; 
                requestAnimationFrame(gameLoop); return;
            }

            if (countdownState === "RESUME_COUNTDOWN") {
                document.getElementById('marathon-indicator').style.display = 'none'; 
                countdownTimeLeft -= dt; countdownValue = Math.ceil(countdownTimeLeft);
                ctx.fillStyle = '#09090d'; ctx.fillRect(0, 0, canvasW, canvasH); drawTracksAndCircles(); 
                
                const fallTime = chartData.fallTime || 1.0;
                const currentTime = gameTimeProgress + (chartData.audioOffset || 0.035);
                let liveTrackXs = isPortraitMode ? [canvasW/4*0.5, canvasW/4*1.5, canvasW/4*2.5, canvasW/4*3.5] : [180, 360, 664, 844];
                const liveJudgmentY = isPortraitMode ? (canvasH - 120) : 460;
                const liveRadius = isPortraitMode ? (canvasW / 10) : 24;
                
                if (chartData && chartData.notes) {
                    const maxRenderTime = currentTime + Math.max(fallTime * 3, 1.5);
                    for (let i = activeNoteIndex; i < chartData.notes.length; i++) {
                        const note = chartData.notes[i];
                        if (note.time > maxRenderTime) break; 
                        if (!note.hit && note.time >= currentTime) {
                            const remain = note.time - currentTime; const y = liveJudgmentY * (1 - (remain / fallTime)); const x = liveTrackXs[note.track];
                            if (y >= 0 && y <= canvasH) {
                                ctx.beginPath(); ctx.arc(x, y, liveRadius, 0, Math.PI * 2); ctx.fillStyle = '#ffdf00'; ctx.fill();
                                ctx.beginPath(); ctx.arc(x, y, liveRadius - 8, 0, Math.PI * 2); ctx.fillStyle = '#ffffff'; ctx.fill();
                            }
                        }
                    }
                }

                ctx.fillStyle = 'rgba(5, 5, 10, 0.6)'; ctx.fillRect(0, 0, canvasW, canvasH);
                ctx.textAlign = 'center'; ctx.fillStyle = '#00e5ff'; ctx.font = 'bold 85px Arial'; 
                ctx.fillText(countdownValue > 0 ? countdownValue : "READY", canvasW / 2, canvasH / 2);
                
                if (countdownTimeLeft <= 0) { countdownState = "NONE"; }
                document.getElementById('lyric-container').style.display = 'none'; 
                requestAnimationFrame(gameLoop); return;
            }
            
            if (isMarathonMode) {
                document.getElementById('marathon-indicator').style.display = 'inline-block';
            } else {
                document.getElementById('marathon-indicator').style.display = 'none';
            }

            document.getElementById('lyric-container').style.display = 'flex';
            gameTimeProgress += dt; if (gameTimeProgress >= 0 && !isAudioStarted) commitAudioPlayback();
            const currentTime = gameTimeProgress + (chartData.audioOffset || 0.035);
            ctx.fillStyle = '#09090d'; ctx.fillRect(0, 0, canvasW, canvasH);
            const liveJudgmentY = drawTracksAndCircles(); const liveRadius = isPortraitMode ? (canvasW / 10) : 24;
            let liveTrackXs = isPortraitMode ? [canvasW/4*0.5, canvasW/4*1.5, canvasW/4*2.5, canvasW/4*3.5] : [180, 360, 664, 844];

            // 核心修改點：利用 activeNoteIndex 指針將時間已過去的音符標記為 MISS 並推進指針
            if (chartData && chartData.notes) {
                const fallTime = chartData.fallTime || 1.0;
                
                // 1. 自動判定過期音符（MISS）並推進起點指針，避免前端累積垃圾運算
                while (activeNoteIndex < chartData.notes.length) {
                    const currNote = chartData.notes[activeNoteIndex];
                    if (currNote.hit) {
                        activeNoteIndex++;
                    } else if (currentTime > currNote.time + 0.15) {
                        currNote.hit = true; 
                        lastJudgmentText = "MISS"; 
                        judgmentColor = "#ff3333"; 
                        combo = 0; 
                        scoreMiss++; 
                        judgmentTimer = 25; 
                        updateScoreAndComboBonus(0);
                        activeNoteIndex++;
                    } else {
                        break; // 最前面的音符都還沒過期，停止推進
                    }
                }

                // 2. 只渲染畫面上「看得到」的區間音符
                const maxVisibleTime = currentTime + Math.max(fallTime * 3, 1.5);
                for (let i = activeNoteIndex; i < chartData.notes.length; i++) {
                    const note = chartData.notes[i];
                    if (note.time > maxVisibleTime) break; // 超過畫面頂端的音符直接中斷，不走多餘運算
                    
                    if (!note.hit && note.time >= currentTime) {
                        const remain = note.time - currentTime; const y = liveJudgmentY * (1 - (remain / fallTime)); const x = liveTrackXs[note.track];
                        if (y >= 0 && y <= canvasH) {
                            ctx.beginPath(); ctx.arc(x, y, liveRadius, 0, Math.PI * 2); ctx.fillStyle = '#ffdf00'; ctx.fill();
                            ctx.beginPath(); ctx.arc(x, y, liveRadius - 8, 0, Math.PI * 2); ctx.fillStyle = '#ffffff'; ctx.fill();
                        }
                    }
                }
            }

            if (judgmentTimer > 0) {
                ctx.textAlign = 'center'; ctx.fillStyle = judgmentColor; ctx.font = 'bold 34px Arial'; ctx.fillText(lastJudgmentText, canvasW / 2, 100);
                if (combo > 0) { ctx.fillStyle = '#ffffff'; ctx.font = 'bold 24px Arial'; ctx.fillText(`${combo} COMBO`, canvasW / 2, 145); }
                judgmentTimer--;
            }

            let lyricStr = "...";
            if (lyrics.length > 0 && gameTimeProgress >= 0) { for (let i = 0; i < lyrics.length; i++) { if (currentTime >= lyrics[i].time) lyricStr = lyrics[i].text; else break; } }
            if (lyricTextElement.innerText !== lyricStr) lyricTextElement.innerText = lyricStr;

            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 18px monospace'; ctx.textAlign = 'right'; ctx.fillText(String(currentLiveScore).padStart(7, '0'), canvasW - 20, 30);
            ctx.fillStyle = '#666680'; ctx.font = '13px monospace'; ctx.textAlign = 'left'; ctx.fillText(`⏱️ ${Math.max(0, currentTime).toFixed(1)}s | P:${scorePerfect} G:${scoreGreat} GD:${scoreGood} B:${scoreBad} M:${scoreMiss}`, 20, isPortraitMode ? 70 : 25);

            if (audioBuffer && gameTimeProgress >= audioBuffer.duration) { if (isMarathonMode) proceedMarathonNextStage(); else showResultScreen(); } 
            else { requestAnimationFrame(gameLoop); }
        }

        function drawTracksAndCircles() {
            const liveJudgmentY = isPortraitMode ? (canvasH - 120) : 460, liveRadius = isPortraitMode ? (canvasW / 10) : 24;
            let liveTrackXs = isPortraitMode ? [canvasW/4*0.5, canvasW/4*1.5, canvasW/4*2.5, canvasW/4*3.5] : [180, 360, 664, 844];
            liveTrackXs.forEach((x, idx) => {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.01)'; ctx.fillRect(x - liveRadius, 0, liveRadius*2, canvasH);
                ctx.strokeStyle = '#1f1f2e'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(x - liveRadius, 0); ctx.lineTo(x - liveRadius, canvasH); ctx.moveTo(x + liveRadius, 0); ctx.lineTo(x + liveRadius, canvasH); ctx.stroke(); 
                if (trackKeyPressed[idx]) { ctx.beginPath(); ctx.arc(x, liveJudgmentY, liveRadius + 8, 0, Math.PI * 2); ctx.fillStyle = 'rgba(0, 229, 255, 0.2)'; ctx.fill(); }
                ctx.beginPath(); ctx.arc(x, liveJudgmentY, liveRadius, 0, Math.PI * 2); ctx.strokeStyle = trackKeyPressed[idx] ? '#ffffff' : '#00e5ff'; ctx.lineWidth = trackKeyPressed[idx] ? 4 : 2; ctx.stroke();
                ctx.fillStyle = trackKeyPressed[idx] ? '#ffffff' : '#55556d'; ctx.font = `bold ${liveRadius*0.7}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(['D', 'F', 'J', 'K'][idx], x, liveJudgmentY);
            });
            return liveJudgmentY;
        }
    </script>
